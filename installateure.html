<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Servicepartner – Haushalt-Genie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1b5e45;
      --primary-light: #4CAF82;
      --border: #e8e8e4;
      --bg: #f5f5f0;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --muted: #888888;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; }
    input, textarea, select { font-family: inherit; }
    a { color: inherit; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let installateure = JSON.parse(localStorage.getItem('hg_installateure') || '[]');
let view = 'list';
let selectedId = null;
let searchQuery = '';
let addError = '';

const params = new URLSearchParams(location.search);
if (params.get('id')) {
  selectedId = params.get('id');
  view = 'detail';
}

// ─── Persistence ─────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('hg_installateure', JSON.stringify(installateure));
  renderPage();
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function today() { return new Date().toISOString().slice(0,10); }
function lbl(text) {
  return `<label style="font-size:11px;font-weight:700;letter-spacing:0.08em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:5px;">${text}</label>`;
}
const INP = `style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;background:#fff;"`;

// ─── SVGs ─────────────────────────────────────────────────────────────────────
const SVG = {
  back: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>`,
  plus: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  phone: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h4l2 5l-2.5 1.5a11 11 0 0 0 5 5l1.5 -2.5l5 2v4a2 2 0 0 1 -2 2a16 16 0 0 1 -15 -15a2 2 0 0 1 2 -2"/></svg>`,
  mail:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,7 12,13 21,7"/></svg>`,
  web:   `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3.6 9h16.8M3.6 15h16.8M11.5 3a17 17 0 0 0 0 18M12.5 3a17 17 0 0 1 0 18"/></svg>`,
};

// ─── Render ───────────────────────────────────────────────────────────────────
function renderPage() {
  document.getElementById('app').innerHTML = view === 'list'   ? renderList()
                                           : view === 'detail' ? renderDetail()
                                           : renderAdd();
}

// ─── List view ────────────────────────────────────────────────────────────────
function renderList() {
  const q = searchQuery.toLowerCase();
  const filtered = installateure
    .filter(i => !q || i.firmenname.toLowerCase().includes(q) || (i.adresse||'').toLowerCase().includes(q) || (i.telefon||'').includes(q))
    .sort((a,b) => a.firmenname.localeCompare(b.firmenname, 'de'));

  const cards = filtered.length === 0
    ? `<div style="text-align:center;padding:4rem 2rem;color:var(--muted);">
         <div style="font-size:14px;margin-bottom:16px;">${q ? 'Keine Treffer für „' + escHtml(searchQuery) + '".' : 'Noch keine Servicepartner gespeichert.'}</div>
         ${!q ? `<button onclick="view='add';renderPage()" style="background:var(--primary);color:#fff;border:none;border-radius:12px;padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;">Manuell erfassen</button>` : ''}
       </div>`
    : filtered.map(i => `
        <div onclick="selectedId='${i.id}';view='detail';renderPage()"
          style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);cursor:pointer;">
          <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;">${escHtml(i.firmenname)}</div>
          ${i.adresse ? `<div style="font-size:13px;color:var(--muted);">${escHtml(i.adresse)}</div>` : ''}
          ${i.telefon ? `<div style="font-size:13px;color:var(--muted);">${escHtml(i.telefon)}</div>` : ''}
        </div>`).join('');

  return `
    <header style="background:#fff;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);">
      <a href="index.html" style="color:var(--text);display:flex;align-items:center;padding:4px;">${SVG.back}</a>
      <span style="font-size:16px;font-weight:700;color:var(--text);">Servicepartner</span>
      <button onclick="view='add';addError='';renderPage()" style="background:none;border:none;color:var(--primary);cursor:pointer;padding:4px;display:flex;">${SVG.plus}</button>
    </header>
    <div style="padding:1rem 1.25rem;max-width:480px;margin:0 auto;">
      <input type="search" placeholder="Suchen …" value="${escHtml(searchQuery)}"
        oninput="searchQuery=this.value;renderPage()"
        style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;background:#fff;margin-bottom:1rem;">
      ${cards}
    </div>`;
}

// ─── Detail / edit view ───────────────────────────────────────────────────────
function renderDetail() {
  const inst = installateure.find(i => i.id === selectedId);
  if (!inst) { view = 'list'; return renderList(); }

  const actionLinks = [
    inst.telefon ? `<a href="tel:${escHtml(inst.telefon)}" style="display:inline-flex;align-items:center;gap:6px;color:var(--primary);font-size:13px;font-weight:600;text-decoration:none;">${SVG.phone} ${escHtml(inst.telefon)}</a>` : '',
    inst.email   ? `<a href="mailto:${escHtml(inst.email)}" style="display:inline-flex;align-items:center;gap:6px;color:var(--primary);font-size:13px;font-weight:600;text-decoration:none;">${SVG.mail} ${escHtml(inst.email)}</a>` : '',
    inst.website ? `<a href="${escHtml(inst.website)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;color:var(--primary);font-size:13px;font-weight:600;text-decoration:none;">${SVG.web} ${escHtml(inst.website)}</a>` : '',
  ].filter(Boolean).join('');

  return `
    <header style="background:#fff;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);">
      <button onclick="view='list';renderPage()" style="background:none;border:none;color:var(--text);cursor:pointer;padding:4px;display:flex;">${SVG.back}</button>
      <span style="font-size:16px;font-weight:700;color:var(--text);">Servicepartner bearbeiten</span>
      <span style="width:28px;"></span>
    </header>
    <div style="padding:1rem 1.25rem;max-width:480px;margin:0 auto;">
      <div style="background:#fff;border-radius:14px;padding:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:14px;display:flex;flex-direction:column;gap:12px;">
        <div>${lbl('Firmenname')}<input id="d-firma" type="text" value="${escHtml(inst.firmenname)}" ${INP}></div>
        <div>${lbl('Adresse')}<input id="d-adresse" type="text" value="${escHtml(inst.adresse)}" ${INP}></div>
        <div>${lbl('Telefon')}<input id="d-telefon" type="tel" value="${escHtml(inst.telefon)}" ${INP}></div>
        <div>${lbl('E-Mail')}<input id="d-email" type="email" value="${escHtml(inst.email)}" ${INP}></div>
        <div>${lbl('Website')}<input id="d-website" type="url" value="${escHtml(inst.website)}" ${INP}></div>
        <div>${lbl('Notizen')}<textarea id="d-notizen" rows="3" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;resize:none;background:#fff;">${escHtml(inst.notizen)}</textarea></div>
      </div>

      ${actionLinks ? `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;">${actionLinks}</div>` : ''}

      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;">
        Erstellt: ${inst.erstellt} · Letzter Kontakt: ${inst.letzterKontakt}
      </div>

      <button onclick="saveDetail('${inst.id}')"
        style="width:100%;padding:13px;border-radius:12px;background:var(--primary);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;">
        Speichern
      </button>
      <button onclick="deleteDetail('${inst.id}')"
        style="display:block;width:100%;padding:10px;border-radius:12px;color:#c0392b;background:none;border:none;font-size:14px;cursor:pointer;text-align:center;">
        Löschen
      </button>
    </div>`;
}

function saveDetail(id) {
  const inst = installateure.find(i => i.id === id);
  if (!inst) return;
  inst.firmenname     = document.getElementById('d-firma').value.trim();
  inst.adresse        = document.getElementById('d-adresse').value.trim();
  inst.telefon        = document.getElementById('d-telefon').value.trim();
  inst.email          = document.getElementById('d-email').value.trim();
  inst.website        = document.getElementById('d-website').value.trim();
  inst.notizen        = document.getElementById('d-notizen').value.trim();
  inst.letzterKontakt = today();
  save();
  view = 'list';
  renderPage();
}

function deleteDetail(id) {
  if (!confirm('Servicepartner wirklich löschen?')) return;
  installateure = installateure.filter(i => i.id !== id);
  localStorage.setItem('hg_installateure', JSON.stringify(installateure));
  view = 'list';
  renderPage();
}

// ─── Add form ─────────────────────────────────────────────────────────────────
function renderAdd() {
  return `
    <header style="background:#fff;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);">
      <button onclick="view='list';renderPage()" style="background:none;border:none;color:var(--text);cursor:pointer;padding:4px;display:flex;">${SVG.back}</button>
      <span style="font-size:16px;font-weight:700;color:var(--text);">Neuer Servicepartner</span>
      <span style="width:28px;"></span>
    </header>
    <div style="padding:1rem 1.25rem;max-width:480px;margin:0 auto;">
      <div style="background:#fff;border-radius:14px;padding:1.25rem;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:14px;display:flex;flex-direction:column;gap:12px;">
        <div>
          ${lbl('Firmenname *')}
          <input id="a-firma" type="text" placeholder="z.B. Heizung Müller GmbH" ${INP}>
          ${addError ? `<div style="color:#c0392b;font-size:12px;margin-top:4px;">${escHtml(addError)}</div>` : ''}
        </div>
        <div>${lbl('Adresse')}<input id="a-adresse" type="text" placeholder="Musterstraße 1, 1010 Wien" ${INP}></div>
        <div>${lbl('Telefon')}<input id="a-telefon" type="tel" placeholder="+43 1 234 5678" ${INP}></div>
        <div>${lbl('E-Mail')}<input id="a-email" type="email" placeholder="office@firma.at" ${INP}></div>
        <div>${lbl('Website')}<input id="a-website" type="url" placeholder="https://firma.at" ${INP}></div>
        <div>${lbl('Notizen')}<textarea id="a-notizen" rows="3" placeholder="Zuständig für Gastherme …" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;resize:none;background:#fff;"></textarea></div>
      </div>

      <button onclick="submitAdd()"
        style="width:100%;padding:13px;border-radius:12px;background:var(--primary);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;">
        Hinzufügen
      </button>
    </div>`;
}

function submitAdd() {
  const firma = document.getElementById('a-firma').value.trim();
  if (!firma) { addError = 'Bitte Firmenname eingeben.'; renderPage(); return; }
  const entry = {
    id:             'inst_' + Date.now(),
    firmenname:     firma,
    adresse:        document.getElementById('a-adresse').value.trim(),
    telefon:        document.getElementById('a-telefon').value.trim(),
    email:          document.getElementById('a-email').value.trim(),
    website:        document.getElementById('a-website').value.trim(),
    notizen:        document.getElementById('a-notizen').value.trim(),
    erstellt:       today(),
    letzterKontakt: today(),
  };
  installateure.push(entry);
  addError = '';
  save();
  view = 'list';
  renderPage();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
renderPage();
</script>
</body>
</html>
