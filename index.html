<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Haushalt-Genie</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen font-sans" style="background:var(--bg);">

<div id="app"></div>

<script src="js/icons.js"></script>
<script src="js/app.js"></script>
<script>
// ─── Page state ───────────────────────────────────────────────────────────────
let selectedRoom = null;
// ─── Room filter ──────────────────────────────────────────────────────────────
function setRoomFilter(roomId) {
  selectedRoom = (selectedRoom === roomId) ? null : roomId;
  const scroller = document.querySelector('[data-room-scroller]');
  const scrollLeft = scroller ? scroller.scrollLeft : 0;
  renderPage();
  const newScroller = document.querySelector('[data-room-scroller]');
  if (newScroller) newScroller.scrollLeft = scrollLeft;
}

// ─── Device status badge ──────────────────────────────────────────────────────
function getDeviceStatus(device) {
  if (device.sold_at) return { label: 'Verkauft', bg: '#F3F4F6', color: '#888' };
  const today = new Date();
  const md = device.myDevice || {};
  if (md.garantieende) {
    const end  = new Date(md.garantieende);
    const days = (end - today) / 86400000;
    if (end < today) return { label: 'Garantie abgelaufen', bg: '#FEF2F2', color: '#dc2626' };
    if (days <= 30)  return { label: 'Garantie läuft ab',   bg: '#FFFBEB', color: '#d97706' };
  }
  if (md.naechsteWartung) {
    const next = new Date(md.naechsteWartung);
    if (next < today) return { label: 'Wartung fällig', bg: '#FFFBEB', color: '#d97706' };
  }
  return { label: 'OK', bg: 'rgba(13,148,136,0.08)', color: '#0D9488' };
}

// ─── SVGs ─────────────────────────────────────────────────────────────────────
const SVG = {
  settings: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>`,
  chevron:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,18 15,12 9,6"/></svg>`,
  home:     `<svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>`,
  devices:  `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`,
  support:  `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
  profile:  `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
};

// ─── Render ───────────────────────────────────────────────────────────────────
function renderPage() {
  const devices = selectedRoom
    ? state.devices.filter(d => d.room === selectedRoom)
    : state.devices;
  document.getElementById('app').innerHTML =
    renderHeader() +
    renderHero() +
    renderRoomCards() +
    renderDeviceList(devices) +
    renderFab() +
    renderBottomNav();
}

// ── Header ────────────────────────────────────────────────────────────────────
function renderHeader() {
  return `
    <header style="background:#fff;padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="color:white;font-size:11px;font-weight:700;letter-spacing:0.02em;">HG</span>
        </div>
        <span style="font-size:16px;font-weight:700;color:var(--text);">Haushalt-Genie</span>
      </div>
      <div style="display:flex;align-items:center;gap:2px;">
        <a href="inventarliste.html" title="Inventarliste exportieren" style="color:var(--muted);display:flex;align-items:center;padding:4px;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M11.5 21h-4.5a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v5m-5 6h7m-3 -3l3 3l-3 3"/></svg></a>
        <a href="settings.html" style="color:var(--muted);display:flex;align-items:center;padding:4px;">${SVG.settings}</a>
      </div>
    </header>`;
}

// ── Hero ──────────────────────────────────────────────────────────────────────
function renderHero() {
  return `
    <div style="padding:1.25rem 1.25rem 0.5rem;">
      <p style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--primary-light);font-weight:600;margin:0 0 6px;">SYSTEMÜBERSICHT</p>
      <h1 style="font-size:34px;font-weight:800;line-height:1.15;color:var(--text);margin:0 0 8px;">Dein Zuhause,<br>perfekt kuratiert.</h1>
      <p style="font-size:14px;color:var(--muted);margin:0;">Alle deine Geräte auf einen Blick</p>
    </div>`;
}

// ── Room cards ────────────────────────────────────────────────────────────────
function renderRoomCards() {
  const counts = {};
  state.devices.forEach(d => { counts[d.room] = (counts[d.room] || 0) + 1; });

  const cards = ROOMS.map(r => {
    const count    = counts[r.id] || 0;
    const isActive = selectedRoom === r.id;
    return `
      <button onclick="setRoomFilter('${r.id}')"
        style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 16px;border-radius:14px;border:2px solid ${isActive?'var(--primary)':'var(--border)'};background:${isActive?'rgba(27,94,69,0.06)':'#fff'};cursor:pointer;min-width:80px;">
        <div style="width:40px;height:40px;border-radius:10px;background:${isActive?'rgba(76,175,130,0.15)':'#F0F0EB'};display:flex;align-items:center;justify-content:center;color:${isActive?'var(--primary)':'var(--muted)'};">${r.icon}</div>
        <span style="font-size:12px;font-weight:600;color:${isActive?'var(--primary)':'var(--text)'};white-space:nowrap;">${r.label}</span>
        <span style="font-size:11px;font-weight:700;color:${count>0?'var(--primary-light)':'var(--muted)'};">${count}</span>
      </button>`;
  }).join('');

  return `
    <div style="padding:0 1.25rem 1rem;">
      <div data-room-scroller style="display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:4px;">
        ${cards}
      </div>
    </div>`;
}

// ── Device list ───────────────────────────────────────────────────────────────
function renderDeviceList(devices) {
  if (state.devices.length === 0) {
    return `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 2rem;text-align:center;">
        <div style="width:64px;height:64px;margin:0 auto 1rem;color:var(--muted);display:flex;align-items:center;justify-content:center;">${icon('home',64)}</div>
        <h2 style="font-size:1.1rem;font-weight:600;color:var(--text);margin:0 0 6px;">Noch keine Geräte</h2>
        <p style="font-size:0.85rem;color:var(--muted);margin:0 0 1.5rem;">Füge dein erstes Haushaltsgerät hinzu, um zu starten.</p>
        <a href="add-device.html" style="background:var(--primary);color:white;padding:0.65rem 1.5rem;border-radius:12px;font-weight:600;font-size:0.875rem;text-decoration:none;">+ Gerät hinzufügen</a>
      </div>`;
  }

  if (devices.length === 0 && selectedRoom) {
    const room = ROOMS.find(r => r.id === selectedRoom);
    return `
      <div style="padding:1.25rem;max-width:480px;margin:0 auto;">
        <div style="background:#fff;border-radius:14px;padding:2rem;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06);">
          <div style="width:48px;height:48px;color:var(--muted);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;">${room ? icon(room.iconKey, 48) : '📦'}</div>
          <p style="font-size:15px;font-weight:600;color:var(--text);margin:0 0 4px;">${room?.label||''}</p>
          <p style="font-size:13px;color:var(--muted);margin:0 0 16px;">Noch keine Geräte in diesem Raum.</p>
          <a href="add-device.html" style="display:inline-block;background:var(--primary);color:#fff;padding:9px 22px;border-radius:10px;font-weight:600;font-size:14px;text-decoration:none;">+ Hinzufügen</a>
        </div>
      </div>`;
  }

  // Group by room
  const grouped = ROOMS
    .map(r => ({ ...r, items: devices.filter(d => d.room === r.id) }))
    .filter(r => r.items.length > 0);

  return `
    <main style="padding:0 1.25rem 160px;max-width:480px;margin:0 auto;">
      ${grouped.map(r => `
        <div style="margin-bottom:12px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <span style="display:flex;align-items:center;color:var(--muted);">${r.icon}</span>
            <span style="font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.06em;">${r.label}</span>
            <span style="font-size:11px;color:var(--muted);">(${r.items.length})</span>
          </div>
          <div style="background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);">
            ${r.items.map((d, i) => renderDeviceRow(d, i === r.items.length - 1)).join('')}
          </div>
        </div>`).join('')}
    </main>`;
}

function renderDeviceRow(device, isLast) {
  const status = getDeviceStatus(device);
  const room   = ROOMS.find(r => r.id === device.room);
  return `
    <a href="device.html?id=${device.id}"
      style="display:flex;align-items:center;gap:12px;padding:12px 16px;text-decoration:none;${isLast?'':'border-bottom:1px solid var(--border);'}">
      ${device.photo
        ? `<img src="data:${device.photoMime||'image/jpeg'};base64,${device.photo}" style="width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;">`
        : `<div style="width:44px;height:44px;border-radius:10px;background:#F0F0EB;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;">${room?.icon||'📦'}</div>`}
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(device.name)}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(device.marke)} · ${escHtml(device.modell)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;">
        <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:${status.bg};color:${status.color};">${status.label}</span>
        ${SVG.chevron}
      </div>
    </a>`;
}

// ── FAB ───────────────────────────────────────────────────────────────────────
function renderFab() {
  return `<a href="add-device.html" class="hg-fab" style="text-decoration:none;font-size:28px;color:white;line-height:1;">+</a>`;
}

// ── Bottom nav ────────────────────────────────────────────────────────────────
function renderBottomNav() {
  return `
    <nav class="hg-bnav">
      <button onclick="selectedRoom=null;renderPage()" class="hg-bnav-item" style="color:var(--primary);">
        ${SVG.home}
        <span style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;">Home</span>
      </button>
      <button onclick="selectedRoom=null;renderPage()" class="hg-bnav-item" style="color:var(--muted);">
        ${SVG.devices}
        <span style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;">Geräte</span>
      </button>
      <a href="installateure.html" class="hg-bnav-item" style="color:var(--muted);text-decoration:none;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"/><path d="M3 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0 -3 -3.85"/></svg>
        <span style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;">Servicepartner</span>
      </a>
      <a href="settings.html" class="hg-bnav-item" style="color:var(--muted);text-decoration:none;">
        ${SVG.profile}
        <span style="font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em;">Profil</span>
      </a>
    </nav>`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
renderPage();
</script>
</body>
</html>
